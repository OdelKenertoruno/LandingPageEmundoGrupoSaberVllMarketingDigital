<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>Ediciones Mundo · Dashboard Analítico</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;500&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
<style>

/* ════════════════════════════════════════════════════
   EDICIONES MUNDO — Dashboard Analítico
   Optimizado para Android sin espacios excesivos
════════════════════════════════════════════════════ */

:root {
  --primary-dark:   #00608B;
  --primary-medium: #0092BA;
  --primary-light:  #A0C5CF;
  --secondary:      #3E3ECE;
  --accent:         #66C9D3;
  --white:          #FFFFFF;
  --gray-soft:      #F2F6F8;
  --gray-mid:       #C8D8DF;
  --text-dark:      #0D2233;
  --text-mid:       #2D4B5E;
  --text-light:     #5E7D8C;

  --font-display: 'Playfair Display', serif;
  --font-body:    'Lora', serif;
  --font-light:   'Cormorant Garamond', serif;

  --radius-lg: 20px;
  --shadow-md: 0 10px 32px rgba(0,32,50,.18);
  --shadow-lg: 0 24px 64px rgba(0,26,44,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: linear-gradient(160deg, #001A2C 0%, var(--primary-dark) 55%, #004F75 100%);
  font-family: var(--font-body);
  color: var(--text-dark);
}

/* ════════════════════════════════════════════════════
   CANVAS
════════════════════════════════════════════════════ */
.dashboard-shell {
  width: 100%;
  max-width: 1480px;
  background: linear-gradient(160deg, var(--primary-dark) 0%, #013a55 100%);
  border-radius: 24px;
  padding: 16px;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  gap: 14px;
  opacity: 0;
  transform: translateY(24px);
  animation: shellEnter .7s ease forwards;
}

/* ════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════ */
.dashboard-header {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 0.8rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(-16px);
  animation: fadeDown .6s ease forwards;
  animation-delay: .05s;
}

.dashboard-header__brand { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }

.dashboard-header__logo {
  height: 38px;
  width: auto;
  object-fit: contain;
  border-radius: 6px;
  display: block;
}

.dashboard-header__text { display: flex; flex-direction: column; gap: 0.05rem; }

.dashboard-header__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--primary-dark);
  line-height: 1.1;
}

.dashboard-header__subtitle {
  font-family: var(--font-light);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-light);
}

.dashboard-header__accent {
  flex: 1;
  height: 7px;
  border-radius: 50px;
  background: linear-gradient(90deg, var(--gray-mid), var(--primary-light), var(--accent));
  margin: 0 .5rem;
}

.dashboard-header__meta {
  font-family: var(--font-light);
  font-size: 0.6rem;
  letter-spacing: .06em;
  color: var(--text-light);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════════════
   BODY
════════════════════════════════════════════════════ */
.dashboard-body { display: flex; gap: 14px; align-items: flex-start; }

/* ── Sidebar — lista de informes, tarjetas separadas y centradas ── */
.dashboard-sidebar {
  width: 210px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  opacity: 0;
  transform: translateX(-18px);
  animation: fadeRight .6s ease forwards;
  animation-delay: .18s;
  align-self: stretch;
}

.reports-list {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-left: 12px;
}

/* Barra indicadora que se desliza hacia la tarjeta activa */
.reports-list__indicator {
  position: absolute;
  left: 0;
  top: 0;
  width: 4px;
  border-radius: 4px;
  background: linear-gradient(180deg, var(--accent), var(--primary-medium));
  transition: transform .4s cubic-bezier(.4,0,.2,1),
              height .4s cubic-bezier(.4,0,.2,1);
}

.report-card {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--gray-mid);
  border-radius: 14px;
  padding: 0.8rem 1rem;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  flex-direction: column;
  gap: .2rem;
  box-shadow: 0 4px 14px rgba(0,32,50,.1);
  transition: background .3s ease, box-shadow .3s ease,
              transform .2s ease, border-color .3s ease;
}

.report-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,32,50,.16);
  border-color: var(--primary-light);
}

.report-card__label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--primary-dark);
  transition: color .3s ease;
}

.report-card__hint {
  font-family: var(--font-light);
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--text-light);
  transition: color .3s ease;
}

.report-card.active {
  background: linear-gradient(135deg, var(--primary-medium), var(--secondary));
  border-color: transparent;
  box-shadow: 0 10px 28px rgba(0,96,139,.3);
}
.report-card.active .report-card__label { color: var(--white); }
.report-card.active .report-card__hint  { color: rgba(255,255,255,.8); }

/* ── Contenido — iframe de Looker Studio ── */
.dashboard-content {
  flex: 1;
  min-width: 0;
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(18px);
  animation: fadeUp .6s ease forwards;
  animation-delay: .3s;
}

.iframe-container {
  position: relative;
  width: 100%;
  padding-bottom: 60%;
  background: var(--gray-soft);
}

.iframe-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  opacity: 0;
  transition: opacity .5s ease;
}
.iframe-container iframe.loaded { opacity: 1; }

.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--gray-soft);
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: opacity .4s ease;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loading-spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--gray-mid);
  border-top-color: var(--primary-medium);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

.loading-overlay span {
  font-family: var(--font-light);
  font-size: 0.75rem;
  letter-spacing: .06em;
  color: var(--text-light);
}

/* ════════════════════════════════════════════════════
   FOOTER
════════════════════════════════════════════════════ */
.dashboard-footer {
  background: linear-gradient(90deg, #001A2C, var(--primary-dark));
  border-radius: var(--radius-lg);
  padding: 0.8rem;
  text-align: center;
  opacity: 0;
  animation: fadeUp .6s ease forwards;
  animation-delay: .42s;
}

.dashboard-footer__tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
  letter-spacing: .02em;
}

/* ════════════════════════════════════════════════════
   ANIMACIONES DE ENTRADA
════════════════════════════════════════════════════ */
@keyframes shellEnter { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeDown    { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeRight   { to { opacity: 1; transform: translateX(0); } }
@keyframes fadeUp      { to { opacity: 1; transform: translateY(0); } }
@keyframes spin        { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: reduce) {
  .dashboard-shell, .dashboard-header, .dashboard-sidebar,
  .dashboard-content, .dashboard-footer {
    animation: none !important;
    opacity: 1 !important;
    transform: none !important;
  }
  .report-card, .reports-list__indicator { transition: none !important; }
}

/* ════════════════════════════════════════════════════
   RESPONSIVE — Optimizado para Android sin espacios grandes
════════════════════════════════════════════════════ */

/* Tablets y pantallas medianas */
@media (max-width: 1100px) {
  .dashboard-sidebar { width: 190px; }
  .iframe-container { padding-bottom: 70%; }
}

/* Móviles grandes y tablets pequeñas */
@media (max-width: 900px) {
  body { padding: 12px; }
  
  .dashboard-shell { 
    padding: 12px; 
    border-radius: 20px; 
    gap: 12px; 
  }
  
  .dashboard-header { 
    padding: 0.7rem 1rem; 
    gap: 0.6rem;
  }
  .dashboard-header__logo { height: 32px; }
  .dashboard-header__title { font-size: 0.95rem; }
  .dashboard-header__subtitle { font-size: 0.55rem; }
  .dashboard-header__accent,
  .dashboard-header__meta { display: none; }

  .dashboard-body { 
    flex-direction: column; 
    gap: 12px; 
  }
  
  .dashboard-sidebar { 
    width: 100%; 
    flex-shrink: 1;
  }
  
  .dashboard-content { 
    flex: none; 
    width: 100%; 
  }

  .reports-list {
    flex-direction: row;
    padding-left: 0;
    padding-bottom: 10px;
    gap: 10px;
  }
  
  .report-card { 
    flex: 1; 
    min-width: 0;
    padding: 0.6rem 0.8rem;
  }
  .report-card__label { font-size: 0.8rem; }
  .report-card__hint { font-size: 0.55rem; }

  .reports-list__indicator {
    top: auto;
    bottom: 0;
    height: 3px !important;
    transition: transform .4s cubic-bezier(.4,0,.2,1),
                width .4s cubic-bezier(.4,0,.2,1);
  }

  .iframe-container { padding-bottom: 100%; }
  
  .dashboard-footer { padding: 0.6rem; }
  .dashboard-footer__tagline { font-size: 0.82rem; }
}

/* Móviles pequeños */
@media (max-width: 480px) {
  body { padding: 8px; }
  
  .dashboard-shell { 
    padding: 8px; 
    border-radius: 16px; 
    gap: 10px; 
  }
  
  .dashboard-header { 
    padding: 0.5rem 0.8rem; 
    gap: 0.5rem;
    border-radius: 14px;
  }
  .dashboard-header__logo { height: 28px; }
  .dashboard-header__title { font-size: 0.82rem; }
  .dashboard-header__subtitle { font-size: 0.5rem; }

  .dashboard-body { gap: 10px; }
  
  .reports-list { gap: 8px; padding-bottom: 8px; }
  .report-card { 
    padding: 0.5rem 0.6rem;
    border-radius: 10px;
  }
  .report-card__label { font-size: 0.7rem; }
  .report-card__hint { font-size: 0.5rem; }

  .reports-list__indicator { height: 2px !important; }

  .iframe-container { padding-bottom: 130%; }
  .iframe-container { border-radius: 14px; }
  
  .dashboard-footer { padding: 0.5rem; border-radius: 14px; }
  .dashboard-footer__tagline { font-size: 0.7rem; }
}

/* Ajuste fino para Android específico */
@media (max-width: 400px) {
  .report-card { 
    padding: 0.4rem 0.5rem;
  }
  .report-card__label { font-size: 0.65rem; }
  .report-card__hint { font-size: 0.45rem; }
  .iframe-container { padding-bottom: 150%; }
}

</style>
</head>
<body>

<div class="dashboard-shell">

  <!-- HEADER -->
  <header class="dashboard-header">
    <div class="dashboard-header__brand">
      <img src="Image/LogoEMundo.png" alt="Ediciones Mundo" class="dashboard-header__logo" />
      <div class="dashboard-header__text">
        <span class="dashboard-header__title">Ediciones Mundo</span>
        <span class="dashboard-header__subtitle">Dashboard analítico — Grupo SABER</span>
      </div>
    </div>
    <div class="dashboard-header__accent" aria-hidden="true"></div>
    <span class="dashboard-header__meta">Actualizado cada 12 horas</span>
  </header>

  <div class="dashboard-body">

    <!-- ══════════════════════════════════════════════════
         SIDEBAR — Tarjetas de informe independientes.
         Para agregar un tercer informe, copia un .report-card
         con su data-page e index correspondiente.
    ══════════════════════════════════════════════════ -->
    <nav class="dashboard-sidebar">
      <div class="reports-list" id="reportsList">
        <span class="reports-list__indicator" id="reportsIndicator" aria-hidden="true"></span>

        <button class="report-card active" data-page="Orf0F" data-index="0">
          <span class="report-card__label">Informe</span>
          <span class="report-card__hint">Vista general</span>
        </button>

        <button class="report-card" data-page="p_8ftts25h4d" data-index="1">
          <span class="report-card__label">Informe Panorámico</span>
          <span class="report-card__hint">Campañas</span>
        </button>
      </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="dashboard-content">
      <div class="iframe-container">
        <iframe
          id="lookerFrame"
          src="https://lookerstudio.google.com/embed/reporting/9d709f3b-dde2-4d48-9db1-3061fb00e263/page/Orf0F"
          frameborder="0"
          allowfullscreen
          sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
          title="Dashboard Looker Studio — Grupo SABER"
          loading="lazy"
        ></iframe>

        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <span>Cargando dashboard...</span>
        </div>
      </div>
    </main>

  </div>

  <!-- FOOTER -->
  <footer class="dashboard-footer">
    <span class="dashboard-footer__tagline">El conocimiento a tu alcance</span>
  </footer>

</div>

<script>
(function () {
  const REPORTING_ID = '9d709f3b-dde2-4d48-9db1-3061fb00e263';
  const BASE_URL     = `https://lookerstudio.google.com/embed/reporting/${REPORTING_ID}/page/`;

  const iframe     = document.getElementById('lookerFrame');
  const overlay    = document.getElementById('loadingOverlay');
  const list       = document.getElementById('reportsList');
  const indicator  = document.getElementById('reportsIndicator');
  const cards      = Array.from(list.querySelectorAll('.report-card'));

  let activeIndex = 0;
  let fallbackTimer;
  let resizeTimer;

  function showLoading() {
    overlay.classList.remove('hidden');
    iframe.classList.remove('loaded');
  }

  function hideLoading() {
    overlay.classList.add('hidden');
    iframe.classList.add('loaded');
  }

  iframe.addEventListener('load', () => {
    clearTimeout(fallbackTimer);
    hideLoading();
  });

  fallbackTimer = setTimeout(hideLoading, 6000);

  function isMobileLayout() {
    return window.matchMedia('(max-width: 900px)').matches;
  }

  function updateIndicator() {
    const card = cards[activeIndex];
    if (!card) return;
    
    if (isMobileLayout()) {
      indicator.style.width  = card.offsetWidth + 'px';
      indicator.style.height = '3px';
      indicator.style.transform = `translateX(${card.offsetLeft}px)`;
    } else {
      indicator.style.width  = '4px';
      indicator.style.height = card.offsetHeight + 'px';
      indicator.style.transform = `translateY(${card.offsetTop}px)`;
    }
  }

  function selectIndex(i) {
    if (i === activeIndex) return;

    cards[activeIndex].classList.remove('active');
    activeIndex = i;
    cards[activeIndex].classList.add('active');
    updateIndicator();

    const page = cards[activeIndex].dataset.page;
    showLoading();
    iframe.src = BASE_URL + page;

    clearTimeout(fallbackTimer);
    fallbackTimer = setTimeout(hideLoading, 6000);
  }

  cards.forEach(card => {
    card.addEventListener('click', () => {
      selectIndex(Number(card.dataset.index));
    });
  });

  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(updateIndicator, 120);
  });

  // Posición inicial del indicador (tras pintar el layout)
  setTimeout(updateIndicator, 50);
})();
</script>

</body>
</html>
