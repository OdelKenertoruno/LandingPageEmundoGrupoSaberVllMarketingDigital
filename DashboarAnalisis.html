<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>Ediciones Mundo · Dashboard Analítico</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;500&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
<style>

/* ════════════════════════════════════════════════════
   EDICIONES MUNDO — Dashboard Analítico
   Paleta institucional, carrusel de informes apilado
════════════════════════════════════════════════════ */

:root {
  --primary-dark:   #00608B;
  --primary-medium: #0092BA;
  --primary-light:  #A0C5CF;
  --secondary:      #3E3ECE;
  --accent:         #66C9D3;
  --white:          #FFFFFF;
  --gray-soft:      #F2F6F8;
  --gray-mid:       #C8D8DF;
  --text-dark:      #0D2233;
  --text-mid:       #2D4B5E;
  --text-light:     #5E7D8C;

  --font-display: 'Playfair Display', serif;
  --font-body:    'Lora', serif;
  --font-light:   'Cormorant Garamond', serif;

  --radius-lg: 20px;
  --shadow-md: 0 10px 32px rgba(0,32,50,.18);
  --shadow-lg: 0 24px 64px rgba(0,26,44,.4);
  --transition: 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px;
  background: linear-gradient(160deg, #001A2C 0%, var(--primary-dark) 55%, #004F75 100%);
  font-family: var(--font-body);
  color: var(--text-dark);
}

/* ════════════════════════════════════════════════════
   CANVAS — el "lienzo" navy donde flotan las tarjetas
════════════════════════════════════════════════════ */
.dashboard-shell {
  width: 100%;
  max-width: 1480px;
  background: linear-gradient(160deg, var(--primary-dark) 0%, #013a55 100%);
  border-radius: 32px;
  padding: 22px;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  gap: 18px;
  opacity: 0;
  transform: translateY(24px);
  animation: shellEnter .7s ease forwards;
}

/* ════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════ */
.dashboard-header {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.6rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(-16px);
  animation: fadeDown .6s ease forwards;
  animation-delay: .05s;
}

.dashboard-header__brand {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  flex-shrink: 0;
}

.dashboard-header__logo {
  height: 46px;
  width: auto;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}

.dashboard-header__text { display: flex; flex-direction: column; gap: 0.15rem; }

.dashboard-header__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--primary-dark);
  line-height: 1.1;
}

.dashboard-header__subtitle {
  font-family: var(--font-light);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-light);
}

/* Acento decorativo que reemplaza la barra gris del boceto */
.dashboard-header__accent {
  flex: 1;
  height: 9px;
  border-radius: 50px;
  background: linear-gradient(90deg, var(--gray-mid), var(--primary-light), var(--accent));
  margin: 0 .75rem;
}

.dashboard-header__meta {
  font-family: var(--font-light);
  font-size: 0.7rem;
  letter-spacing: .08em;
  color: var(--text-light);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════════════
   BODY — sidebar + contenido
════════════════════════════════════════════════════ */
.dashboard-body {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

/* ── Sidebar — carrusel apilado de informes ── */
.dashboard-sidebar {
  width: 230px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: .9rem;
  opacity: 0;
  transform: translateX(-18px);
  animation: fadeRight .6s ease forwards;
  animation-delay: .18s;
}

.tabs-carousel {
  position: relative;
  height: 150px;
}

.tab-card {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 106px;
  border: none;
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 14px 34px rgba(0,32,50,.3);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 1.1rem 1.3rem;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: transform .5s cubic-bezier(.4,0,.2,1),
              opacity .5s ease,
              box-shadow .4s ease,
              filter .4s ease;
}

.tab-card__label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  color: var(--primary-dark);
}

.tab-card__hint {
  font-family: var(--font-light);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-top: .35rem;
}

/* Posiciones del apilado según distancia al activo */
.tab-card[data-offset="0"] {
  transform: translate(0,0) scale(1);
  opacity: 1;
  z-index: 3;
  box-shadow: 0 16px 38px rgba(0,32,50,.32);
}
.tab-card[data-offset="1"] {
  transform: translate(0,-14px) scale(.94);
  opacity: .45;
  z-index: 2;
  filter: saturate(.65);
}
.tab-card[data-offset="2"] {
  transform: translate(0,-26px) scale(.88);
  opacity: .22;
  z-index: 1;
  filter: saturate(.45);
  pointer-events: none;
}

.tab-card:not([data-offset="0"]):hover {
  opacity: .72;
  filter: none;
}

.sidebar__hint {
  font-family: var(--font-light);
  font-size: 0.68rem;
  letter-spacing: .04em;
  color: rgba(255,255,255,.55);
  text-align: center;
  padding: 0 .5rem;
}

/* ── Contenido — iframe de Looker Studio ── */
.dashboard-content {
  flex: 1;
  min-width: 0;
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(18px);
  animation: fadeUp .6s ease forwards;
  animation-delay: .3s;
}

.iframe-container {
  position: relative;
  width: 100%;
  padding-bottom: 62%;
  background: var(--gray-soft);
}

.iframe-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  opacity: 0;
  transition: opacity .5s ease;
}
.iframe-container iframe.loaded { opacity: 1; }

.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--gray-soft);
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: opacity .4s ease;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loading-spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--gray-mid);
  border-top-color: var(--primary-medium);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

.loading-overlay span {
  font-family: var(--font-light);
  font-size: 0.8rem;
  letter-spacing: .06em;
  color: var(--text-light);
}

/* ════════════════════════════════════════════════════
   FOOTER
════════════════════════════════════════════════════ */
.dashboard-footer {
  background: linear-gradient(90deg, #001A2C, var(--primary-dark));
  border-radius: var(--radius-lg);
  padding: 1.05rem;
  text-align: center;
  opacity: 0;
  animation: fadeUp .6s ease forwards;
  animation-delay: .42s;
}

.dashboard-footer__tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 700;
  font-size: 1.02rem;
  color: var(--white);
  letter-spacing: .02em;
}

/* ════════════════════════════════════════════════════
   ANIMACIONES DE ENTRADA
════════════════════════════════════════════════════ */
@keyframes shellEnter { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeDown    { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeRight   { to { opacity: 1; transform: translateX(0); } }
@keyframes fadeUp      { to { opacity: 1; transform: translateY(0); } }
@keyframes spin        { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: reduce) {
  .dashboard-shell, .dashboard-header, .dashboard-sidebar,
  .dashboard-content, .dashboard-footer {
    animation: none !important;
    opacity: 1 !important;
    transform: none !important;
  }
  .tab-card { transition: opacity .3s ease !important; }
}

/* ════════════════════════════════════════════════════
   RESPONSIVE — modelo horizontal / tablet
════════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  .iframe-container { padding-bottom: 72%; }
}

/* ── Mobile: sidebar pasa a fila horizontal ── */
@media (max-width: 900px) {
  .dashboard-shell  { padding: 14px; border-radius: 26px; gap: 14px; }
  .dashboard-header { flex-wrap: wrap; padding: 1rem 1.2rem; }
  .dashboard-header__accent,
  .dashboard-header__meta { display: none; }

  .dashboard-body   { flex-direction: column; gap: 14px; }
  .dashboard-sidebar{ width: 100%; }

  .tabs-carousel { height: 106px; }
  .tab-card      { height: 106px; }

  .tab-card[data-offset="0"] { transform: translate(0,0) scale(1); }
  .tab-card[data-offset="1"] { transform: translate(14px,0) scale(.94); }
  .tab-card[data-offset="2"] { transform: translate(26px,0) scale(.88); }

  .sidebar__hint { display: none; }
  .iframe-container { padding-bottom: 120%; }
}

@media (max-width: 480px) {
  .dashboard-header__title    { font-size: 1.05rem; }
  .dashboard-header__subtitle { font-size: 0.62rem; }
  .tab-card__label  { font-size: 0.9rem; }
  .tab-card__hint   { font-size: 0.62rem; }
  .dashboard-footer__tagline { font-size: 0.86rem; }
}

</style>
</head>
<body>

<div class="dashboard-shell">

  <!-- HEADER -->
  <header class="dashboard-header">
    <div class="dashboard-header__brand">
      <img src="Image/LogoEMundo.png" alt="Ediciones Mundo" class="dashboard-header__logo" />
      <div class="dashboard-header__text">
        <span class="dashboard-header__title">Ediciones Mundo</span>
        <span class="dashboard-header__subtitle">Dashboard analítico — Grupo SABER</span>
      </div>
    </div>
    <div class="dashboard-header__accent" aria-hidden="true"></div>
    <span class="dashboard-header__meta">Actualizado cada 12 horas</span>
  </header>

  <div class="dashboard-body">

    <!-- ══════════════════════════════════════════════════
         SIDEBAR — Carrusel apilado de informes.
         Para agregar un tercer informe, copia un .tab-card
         con su data-page e index correspondiente.
    ══════════════════════════════════════════════════ -->
    <nav class="dashboard-sidebar">
      <div class="tabs-carousel" id="tabsCarousel">
        <button class="tab-card" data-page="Orf0F" data-index="0">
          <span class="tab-card__label">Informe</span>
          <span class="tab-card__hint">Vista general</span>
        </button>
        <button class="tab-card" data-page="p_8ftts25h4d" data-index="1">
          <span class="tab-card__label">Informe Panorámico</span>
          <span class="tab-card__hint">Campañas</span>
        </button>
      </div>
      <p class="sidebar__hint">Desliza o haz scroll para cambiar de informe</p>
    </nav>

    <!-- CONTENIDO -->
    <main class="dashboard-content">
      <div class="iframe-container">
        <iframe
          id="lookerFrame"
          src="https://lookerstudio.google.com/embed/reporting/9d709f3b-dde2-4d48-9db1-3061fb00e263/page/Orf0F"
          frameborder="0"
          allowfullscreen
          sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
          title="Dashboard Looker Studio — Grupo SABER"
          loading="lazy"
        ></iframe>

        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <span>Cargando dashboard...</span>
        </div>
      </div>
    </main>

  </div>

  <!-- FOOTER -->
  <footer class="dashboard-footer">
    <span class="dashboard-footer__tagline">El conocimiento a tu alcance</span>
  </footer>

</div>

<script>
(function () {
  // ID del reporte (la parte entre /reporting/ y /page/)
  const REPORTING_ID = '9d709f3b-dde2-4d48-9db1-3061fb00e263';
  const BASE_URL     = `https://lookerstudio.google.com/embed/reporting/${REPORTING_ID}/page/`;

  const iframe   = document.getElementById('lookerFrame');
  const overlay  = document.getElementById('loadingOverlay');
  const carousel = document.getElementById('tabsCarousel');
  const cards    = Array.from(carousel.querySelectorAll('.tab-card'));

  let activeIndex = 0;
  let fallbackTimer;

  function showLoading() {
    overlay.classList.remove('hidden');
    iframe.classList.remove('loaded');
  }

  function hideLoading() {
    overlay.classList.add('hidden');
    iframe.classList.add('loaded');
  }

  iframe.addEventListener('load', () => {
    clearTimeout(fallbackTimer);
    hideLoading();
  });

  // Fallback por si el iframe no dispara "load" (cross-origin lento)
  fallbackTimer = setTimeout(hideLoading, 6000);

  function updateCarousel() {
    const count = cards.length;
    cards.forEach((card, i) => {
      const offset = (i - activeIndex + count) % count;
      card.dataset.offset = offset;
    });
  }

  function selectIndex(i) {
    if (i === activeIndex) return;
    activeIndex = i;
    updateCarousel();

    const page = cards[activeIndex].dataset.page;
    showLoading();
    iframe.src = BASE_URL + page;

    clearTimeout(fallbackTimer);
    fallbackTimer = setTimeout(hideLoading, 6000);
  }

  // Click — selecciona directamente la tarjeta tocada
  cards.forEach(card => {
    card.addEventListener('click', () => {
      selectIndex(Number(card.dataset.index));
    });
  });

  // Scroll del mouse sobre el carrusel — cicla entre informes
  carousel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const dir  = e.deltaY > 0 ? 1 : -1;
    const next = (activeIndex + dir + cards.length) % cards.length;
    selectIndex(next);
  }, { passive: false });

  // Swipe táctil — soporte para móvil
  let touchStartY = 0;
  carousel.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  carousel.addEventListener('touchend', (e) => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) < 28) return;
    const dir  = dy > 0 ? 1 : -1;
    const next = (activeIndex + dir + cards.length) % cards.length;
    selectIndex(next);
  }, { passive: true });

  updateCarousel();
})();
</script>

</body>
</html>
