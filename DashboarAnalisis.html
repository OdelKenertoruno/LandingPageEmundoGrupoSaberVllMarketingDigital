<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard Analítico | Looker Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        /* ── Contenedor general ── */
        .dashboard-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* ── Header ── */
        .dashboard-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #1e3c72, #2b4c8a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .dashboard-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .dashboard-header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* Tabs para cambiar entre páginas del reporte */
        .tab-bar {
            display: flex;
            gap: 8px;
            padding: 0.75rem 2rem;
            background: #1a3360;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.3);
            background: transparent;
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .tab-btn.active {
            background: white;
            color: #1e3c72;
            font-weight: 600;
            border-color: white;
        }

        /* ── Iframe ── */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 73.83%;
            background: #f9fafb;
            overflow: hidden;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f9fafb;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            font-family: monospace;
            color: #2c5f8a;
            z-index: 10;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #2b4c8a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* ── Footer ── */
        .dashboard-footer {
            padding: 1rem 2rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #4a5568;
            text-align: center;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .dashboard-header { padding: 1rem 1.5rem; }
            .dashboard-header h1 { font-size: 1.4rem; }
            .tab-bar { padding: 0.5rem 1rem; }
            .dashboard-footer { padding: 0.8rem 1rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <div class="dashboard-header">
        <div>
            <h1>📊 Dashboard Analítico</h1>
            <p>Visualización de métricas clave — Grupo SABER</p>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TABS — Agrega aquí tus páginas de Looker Studio
         Cada tab cambia el src del iframe al page ID correcto
         ══════════════════════════════════════════════════════ -->
    <div class="tab-bar">
        <button class="tab-btn active" data-page="Orf0F">📈 General</button>
        <!-- ✅ CUANDO TENGAS LA PÁGINA DE CAMPAÑAS EN LOOKER,
             reemplaza PAGE_ID_CAMPANIAS con el ID real de esa página -->
        <button class="tab-btn" data-page="p_8ftts25h4d">📣 Campañas</button>
    </div>

    <div class="iframe-container">
        <!-- ✅ CAMBIA EL REPORTING ID si tu reporte de Looker Studio es otro -->
        <iframe
            id="lookerFrame"
            src="https://lookerstudio.google.com/embed/reporting/9d709f3b-dde2-4d48-9db1-3061fb00e263/page/Orf0F"
            frameborder="0"
            allowfullscreen
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
            title="Dashboard Looker Studio — Grupo SABER"
            loading="lazy"
        ></iframe>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <span>Cargando dashboard...</span>
        </div>
    </div>

    <div class="dashboard-footer">
        <span>📈 Datos actualizados cada 12h — Powered by Looker Studio &amp; Google Analytics 4</span>
    </div>

</div>

<script>
(function () {
    // ── ID del reporte (la parte entre /reporting/ y /page/) ──
    const REPORTING_ID = '9d709f3b-dde2-4d48-9db1-3061fb00e263';
    const BASE_URL     = `https://lookerstudio.google.com/embed/reporting/${REPORTING_ID}/page/`;

    const iframe  = document.getElementById('lookerFrame');
    const overlay = document.getElementById('loadingOverlay');
    const tabs    = document.querySelectorAll('.tab-btn');

    // ── Ocultar overlay cuando carga el iframe ──
    function onIframeLoad() {
        overlay.classList.add('hidden');
    }

    // Fallback: ocultar overlay tras 6s si el iframe no dispara onload
    let fallbackTimer = setTimeout(() => overlay.classList.add('hidden'), 6000);

    iframe.addEventListener('load', () => {
        clearTimeout(fallbackTimer);
        onIframeLoad();
    });

    // ── Cambio de tab ──
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const pageId = tab.getAttribute('data-page');

            // No hacer nada si ya está activo
            if (tab.classList.contains('active')) return;

            // Activar tab
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            // Mostrar overlay y cambiar iframe
            overlay.classList.remove('hidden');
            iframe.src = BASE_URL + pageId;

            // Fallback por si el iframe no dispara load
            clearTimeout(fallbackTimer);
            fallbackTimer = setTimeout(() => overlay.classList.add('hidden'), 6000);
        });
    });
})();
</script>

</body>
</html>
